name: Deploy to GitHub Pages

on:
  push:
    branches:
      - github-pages 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4 # Specifies the pnpm version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "pnpm"
        working-directory: ./jaess105-portfolio

      - name: Install dependencies
        # Runs installation inside the subfolder
        run: pnpm install --frozen-lockfile
        working-directory: ./jaess105-portfolio

      - name: Build project
        # Builds the project inside the subfolder
        run: pnpm run build
        working-directory: ./jaess105-portfolio

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the dist folder inside your subfolder
          path: "./jaess105-portfolio/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
